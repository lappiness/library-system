<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 28px 24px; max-width: 360px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h2 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }
  label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }
  input { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 16px; }
  input:focus { border-color: #534ab7; }
  .optional { font-weight: 400; color: #aaa; font-size: 12px; margin-left: 4px; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: #534ab7; color: #fff; transition: opacity 0.2s; margin-bottom: 10px; }
  .btn:active { opacity: 0.8; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .pin-hint { font-size: 12px; color: #888; margin-bottom: 16px; line-height: 1.6; background: #f0efff; border-radius: 8px; padding: 10px 12px; }
  .loading-wrap { text-align: center; padding: 40px 0; }
  .loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
  .loading-dots span { width: 8px; height: 8px; background: #534ab7; border-radius: 50%; opacity: 0.3; animation: dot 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100%{opacity:0.3;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }
  .loading-text { font-size: 13px; color: #aaa; }
  .success-icon { font-size: 48px; margin-bottom: 12px; text-align: center; }
  .success-text { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 6px; text-align: center; }
  .guide-box { background: #f0efff; border-radius: 14px; padding: 18px 16px; margin-top: 20px; }
  .guide-title { font-size: 13px; font-weight: 700; color: #534ab7; margin-bottom: 8px; }
  .guide-text { font-size: 13px; color: #444; line-height: 1.7; }
  .error { font-size: 13px; color: #d85a30; margin-bottom: 12px; text-align: center; }
</style>
</head>
<body>
<div class="card" id="main">
  <h2>はじめての方へ</h2>
  <p class="sub">お名前とPINを登録すると、次回からQRを読み取ってPINを入力するだけで借りられます。</p>

  <label>お名前 <span style="color:#d85a30">*</span></label>
  <input type="text" id="name" placeholder="山田 太郎" maxlength="30">

  <label>所属 <span class="optional">任意</span></label>
  <input type="text" id="affiliation" placeholder="営業部・社外 など" maxlength="30">

  <label>4桁のPIN番号 <span style="color:#d85a30">*</span></label>
  <div class="pin-hint">好きな4桁の数字を決めてください。次回から本を借りる時に使います。忘れないようにメモしておいてください。</div>
  <input type="number" id="pin" placeholder="例：1234" maxlength="4" oninput="if(this.value.length>4)this.value=this.value.slice(0,4)">

  <div class="error" id="error" style="display:none"></div>
  <button class="btn" id="submit-btn" onclick="doRegister()">登録して使いはじめる</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyw4zYFkXmRRtHT8M5kxwRWAn99MXgaNcFRA-DP-g77EMI2OBcx6QEmug-s-yKNKFA/exec';

async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const affiliation = document.getElementById('affiliation').value.trim();
  const errEl = document.getElementById('error');

  if (!name) { document.getElementById('name').focus(); return; }
  if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    errEl.textContent = '4桁の数字を入力してください';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('main').innerHTML = `
    <div class="loading-wrap">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">登録中...</div>
    </div>`;

  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'register', name: name, affiliation: affiliation, pin: pin })
  });
  const data = await res.json();

  if (data.error === 'pin_taken') {
    document.getElementById('main').innerHTML = `
      <h2>はじめての方へ</h2>
      <p class="sub">そのPINはすでに使われています。別の4桁を選んでください。</p>
      <label>お名前</label>
      <input type="text" id="name" value="${name}" maxlength="30">
      <label>所属</label>
      <input type="text" id="affiliation" value="${affiliation}" maxlength="30">
      <label>4桁のPIN番号</label>
      <div class="pin-hint">別の4桁を入力してください</div>
      <input type="number" id="pin" placeholder="例：5678" maxlength="4" oninput="if(this.value.length>4)this.value=this.value.slice(0,4)">
      <div class="error" id="error" style="display:none"></div>
      <button class="btn" id="submit-btn" onclick="doRegister()">登録して使いはじめる</button>`;
    return;
  }

  try { localStorage.setItem('library_user_id', data.userId); } catch(e) {}

  document.getElementById('main').innerHTML = `
    <div class="success-icon">✓</div>
    <div class="success-text">登録完了！ようこそ、${name} さん。</div>
    <div class="guide-box">
      <div class="guide-title">📌 PINを忘れずに！</div>
      <div class="guide-text">
        あなたのPINは <strong style="font-size:20px;color:#534ab7">${pin}</strong> です。<br><br>
        次回から本のQRを読み取ったあと、このPINを入力するだけで借りられます。
      </div>
    </div>
    <div class="guide-box" style="margin-top:12px;background:#e1f5ee">
      <div class="guide-title" style="color:#085041">📚 次のステップ</div>
      <div class="guide-text">
        このタブを閉じて、借りたい本の<strong>QRコードをカメラで読み取って</strong>ください。
      </div>
    </div>
  `;
}
</script>
</body>
</html>
